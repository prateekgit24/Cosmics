        :root {

        }

        p {
            color: var(--muted);
            margin-bottom: 32px;
            font-size: 18px;
        }
        
        .btn {
            background: var(--accent);
            color: #fff;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
